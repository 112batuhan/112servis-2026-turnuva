services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: discord_auth_starter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/discord_auth_starter
      SERVER_ADDR: 0.0.0.0:8080
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      OSU_CLIENT_ID: ${OSU_CLIENT_ID:?set OSU_CLIENT_ID in .env}
      OSU_CLIENT_SECRET: ${OSU_CLIENT_SECRET:?set OSU_CLIENT_SECRET in .env}
      OSU_REDIRECT_URI: ${OSU_REDIRECT_URI:-http://localhost:8080/auth/osu/callback}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:?set DISCORD_CLIENT_ID in .env}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:?set DISCORD_CLIENT_SECRET in .env}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-http://localhost:8080/auth/discord/callback}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
